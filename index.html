<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Dropdown UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dropdown-container">
        
        <div class="custom-dropdown" id="myDropdown">
            <div class="dropdown-selected">
                <span id="selectedText">Select an Item</span>
                <span class="arrow">v</span>
            </div>
            
            <ul class="dropdown-menu">
                <li class="dropdown-item" data-value="1">First Item</li>
                <li class="dropdown-item" data-value="2">Second Item</li>
                <li class="dropdown-item" data-value="3">Third Item</li>
                <li class="dropdown-item" data-value="4">Fourth Item</li>
                <li class="dropdown-item" data-value="5">Fifth Item</li>
            </ul>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
